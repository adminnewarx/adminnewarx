<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 280" width="1280" height="280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0F2245;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A3A6C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E86DE;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#2E86DE;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#54C6EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#54C6EB;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="dotFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E86DE;stop-opacity:0.0" />
      <stop offset="50%" style="stop-color:#2E86DE;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#2E86DE;stop-opacity:0.0" />
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1280" height="280" fill="url(#bgGrad)" rx="12"/>

  <!-- Patrón de puntos de datos (grid sutil) -->
  <g opacity="0.12">
    <line x1="0" y1="70" x2="1280" y2="70" stroke="#2E86DE" stroke-width="0.5" stroke-dasharray="2,18"/>
    <line x1="0" y1="140" x2="1280" y2="140" stroke="#2E86DE" stroke-width="0.5" stroke-dasharray="2,18"/>
    <line x1="0" y1="210" x2="1280" y2="210" stroke="#2E86DE" stroke-width="0.5" stroke-dasharray="2,18"/>
    <line x1="180" y1="0" x2="180" y2="280" stroke="#2E86DE" stroke-width="0.5" stroke-dasharray="2,18"/>
    <line x1="360" y1="0" x2="360" y2="280" stroke="#2E86DE" stroke-width="0.5" stroke-dasharray="2,18"/>
    <line x1="540" y1="0" x2="540" y2="280" stroke="#2E86DE" stroke-width="0.5" stroke-dasharray="2,18"/>
    <line x1="720" y1="0" x2="720" y2="280" stroke="#2E86DE" stroke-width="0.5" stroke-dasharray="2,18"/>
    <line x1="900" y1="0" x2="900" y2="280" stroke="#2E86DE" stroke-width="0.5" stroke-dasharray="2,18"/>
    <line x1="1080" y1="0" x2="1080" y2="280" stroke="#2E86DE" stroke-width="0.5" stroke-dasharray="2,18"/>
  </g>

  <!-- Forma decorativa derecha: gráfico de barras estilizado -->
  <g opacity="0.15" transform="translate(950, 40)">
    <rect x="0"   y="130" width="28" height="80"  rx="3" fill="#2E86DE"/>
    <rect x="40"  y="90"  width="28" height="120" rx="3" fill="#2E86DE"/>
    <rect x="80"  y="50"  width="28" height="160" rx="3" fill="#54C6EB"/>
    <rect x="120" y="70"  width="28" height="140" rx="3" fill="#54C6EB"/>
    <rect x="160" y="30"  width="28" height="180" rx="3" fill="#2E86DE"/>
    <rect x="200" y="60"  width="28" height="150" rx="3" fill="#2E86DE"/>
    <rect x="240" y="100" width="28" height="110" rx="3" fill="#1A5FA8"/>
  </g>

  <!-- Línea de tendencia sobre barras -->
  <polyline 
    points="964,158 1004,118 1044,78 1084,98 1124,58 1164,88 1204,128"
    fill="none" stroke="#54C6EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <circle cx="1044" cy="78"  r="4" fill="#54C6EB" opacity="0.5"/>
  <circle cx="1124" cy="58"  r="4" fill="#54C6EB" opacity="0.5"/>

  <!-- Línea separadora izquierda (acento de color) -->
  <rect x="80" y="70" width="5" height="140" rx="2.5" fill="#2E86DE" opacity="0.9"/>

  <!-- Logotipo: texto NewARX -->
  <text x="112" y="145" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#FFFFFF">
    New<tspan fill="#2E86DE">ARX</tspan>
  </text>

  <!-- Tagline -->
  <text x="113" y="178" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400" fill="#8FB8E8" letter-spacing="1">
    Inteligencia de Negocio  ·  Inteligencia Artificial  ·  SaaS
  </text>

  <!-- Línea divisora inferior -->
  <rect x="0" y="270" width="1280" height="3" fill="url(#accentLine)" rx="1"/>

  <!-- Píldora / chip URL -->
  <rect x="113" y="198" width="160" height="28" rx="14" fill="#2E86DE" opacity="0.2"/>
  <text x="193" y="217" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="500" fill="#54C6EB" text-anchor="middle" letter-spacing="0.5">www.newarx.es</text>
</svg>
